<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Breakpoint Specimen — Static Fallback</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 2rem; }
    dl { display: grid; grid-template-columns: max-content 1fr; gap: 0.25rem 1rem; max-width: 30rem; }
    dt { font-family: ui-monospace, monospace; font-weight: 600; }
    dd { margin: 0; color: #666; }
  </style>
</head>
<body>
  <!--
    Static fallback for <breakpoint-specimen>.

    Upgrade relationship:
    - Without JS, modern browsers: the @media-driven highlight in the
      component's stylesheet calls out the active row, so even no-JS
      readers see which breakpoint is in effect.
    - Without JS or CSS: the <dl> below remains a readable list of
      breakpoint names and their token values.
    - With JS: the component adds a live numeric width readout and a
      moving cursor on a visual ruler, plus container-query tracking
      via data-observe.
  -->

  <breakpoint-specimen>
    <dl>
      <dt>sm</dt><dd>37.5rem (600px) and up — compact mobile</dd>
      <dt>md</dt><dd>48rem (768px) and up — tablet / mobile split</dd>
      <dt>lg</dt><dd>64rem (1024px) and up — desktop layouts</dd>
      <dt>xl</dt><dd>87.5rem (1400px) and up — ultra-wide enhancements</dd>
    </dl>
  </breakpoint-specimen>
</body>
</html>
