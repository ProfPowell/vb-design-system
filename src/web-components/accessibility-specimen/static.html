<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>accessibility-specimen demo</title>
  <link rel="stylesheet" href="/src/main.css">
  <style>
    body { font-family: system-ui, sans-serif; max-inline-size: 48rem; margin-inline: auto; padding: 2rem 1rem; line-height: 1.5; }
    section { margin-block: 1.5rem; }
  </style>
</head>
<body>
  <h1>accessibility-specimen</h1>

  <section>
    <h2>Contrast pairs</h2>
    <accessibility-specimen>
      <button data-fg="#000000" data-bg="#ffffff" data-label="Black on white">Default text</button>
      <button data-fg="#666" data-bg="#ffffff" data-label="Mid-gray on white">Muted text</button>
      <button data-fg="#ffffff" data-bg="#0066cc" data-label="White on accent blue">Action button</button>
      <button data-fg="#ffffff" data-bg="#ddd" data-label="White on light-gray">Bad pairing</button>
    </accessibility-specimen>
  </section>

  <section>
    <h2>Checklist</h2>
    <accessibility-specimen type="checklist">
      <ul>
        <li data-status="pass">Form inputs have associated labels.</li>
        <li data-status="pass">Focus indicators are visible at 2px width minimum.</li>
        <li data-status="warn">Some images may be missing alt text.</li>
        <li data-status="fail">Color contrast on muted text fails AA.</li>
        <li data-status="na">No videos in this component (captions N/A).</li>
      </ul>
    </accessibility-specimen>
  </section>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
