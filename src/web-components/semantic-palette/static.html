<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Semantic Palette (Static Fallback)</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      line-height: 1.5;
      max-inline-size: 40rem;
      margin-inline: auto;
      padding: 2rem 1rem;
    }
  </style>
</head>
<body>

  <!--
    Upgrade relationship
    ====================
    This static HTML is the baseline that <semantic-palette> enhances.
    Without JS the colors list is still readable as a definition list.
  -->

  <h1>Semantic Palette</h1>

  <noscript>
    <p>This component works best with JavaScript enabled.</p>
  </noscript>

  <semantic-palette colors="#6366f1,#ec4899,#22c55e">
    <dl>
      <dt>primary</dt><dd>#6366f1</dd>
      <dt>secondary</dt><dd>#ec4899</dd>
      <dt>accent</dt><dd>#22c55e</dd>
    </dl>
  </semantic-palette>

</body>
</html>
