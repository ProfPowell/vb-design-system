<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spacing Specimen (Static Fallback)</title>
  <style>
    /*
     * Static fallback for <spacing-specimen>.
     *
     * Upgrade relationship:
     * When JavaScript loads and the <spacing-specimen> custom element is
     * defined, it reads the VB spacing tokens from computed styles and
     * renders a visual scale with labeled bars and computed pixel values.
     *
     * Without JS, this static page presents a simple list of spacing
     * token names and their CSS custom property references, providing
     * equivalent information through plain semantic HTML.
     */

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: system-ui, sans-serif;
      line-height: 1.6;
      margin: 0;
      padding: 2rem;
      color: #1a1a1a;
      background: #f8f8f8;
    }

    h1 { margin-block-end: 1rem; }

    dl {
      display: grid;
      grid-template-columns: 4rem 1fr;
      gap: 0.5rem 1rem;
      max-width: 30rem;
    }

    dt {
      font-family: ui-monospace, monospace;
      font-size: 0.875rem;
      text-align: end;
    }

    dd {
      margin: 0;
      font-family: ui-monospace, monospace;
      font-size: 0.875rem;
      color: #666;
    }
  </style>
</head>
<body>
  <h1>Spacing Scale</h1>
  <p>These tokens define the spacing system. With JavaScript enabled, this becomes a visual bar chart.</p>

  <dl>
    <dt>3xs</dt><dd>var(--size-3xs)</dd>
    <dt>2xs</dt><dd>var(--size-2xs)</dd>
    <dt>xs</dt><dd>var(--size-xs)</dd>
    <dt>s</dt><dd>var(--size-s)</dd>
    <dt>m</dt><dd>var(--size-m)</dd>
    <dt>l</dt><dd>var(--size-l)</dd>
    <dt>xl</dt><dd>var(--size-xl)</dd>
    <dt>2xl</dt><dd>var(--size-2xl)</dd>
    <dt>3xl</dt><dd>var(--size-3xl)</dd>
  </dl>
</body>
</html>
