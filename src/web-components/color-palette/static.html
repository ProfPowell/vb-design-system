<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Color Palette — Static Fallback</title>
</head>
<body>
  <!--
    Static fallback for <color-palette>.

    Upgrade relationship:
    - Without JS: Color values are presented as a simple list of text items.
      Users can read and manually copy color codes. Names and values are
      visible as plain text alongside visual swatch indicators using inline
      background colors on small spans.
    - With JS: <color-palette> parses the `colors` and `names` attributes,
      renders interactive swatch buttons with proper contrast text, supports
      click-to-copy via the Clipboard API, fires `color-palette:select`
      events, and provides visual flash feedback on selection. Supports
      inline, grid, and list layouts.

    The static form preserves the essential information — the color values
    themselves — which is the primary content of the component.
  -->

  <main>
    <h1>Color Palette</h1>

    <ul aria-label="Color palette">
      <li>
        <span style="display:inline-block;width:1em;height:1em;background:#ff6b6b;vertical-align:middle;border:1px solid #ccc" aria-hidden="true"></span>
        Red: <code>#ff6b6b</code>
      </li>
      <li>
        <span style="display:inline-block;width:1em;height:1em;background:#4ecdc4;vertical-align:middle;border:1px solid #ccc" aria-hidden="true"></span>
        Teal: <code>#4ecdc4</code>
      </li>
      <li>
        <span style="display:inline-block;width:1em;height:1em;background:#45b7d1;vertical-align:middle;border:1px solid #ccc" aria-hidden="true"></span>
        Sky: <code>#45b7d1</code>
      </li>
      <li>
        <span style="display:inline-block;width:1em;height:1em;background:#96ceb4;vertical-align:middle;border:1px solid #ccc" aria-hidden="true"></span>
        Sage: <code>#96ceb4</code>
      </li>
      <li>
        <span style="display:inline-block;width:1em;height:1em;background:#ffeaa7;vertical-align:middle;border:1px solid #ccc" aria-hidden="true"></span>
        Butter: <code>#ffeaa7</code>
      </li>
    </ul>
  </main>
</body>
</html>
