<!doctype html>
<html lang="en" data-page="docs" data-fluid data-sticky data-icon-path="%BASE_PATH%/cdn/icons">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>window.__VB_THEME_BASE="%BASE_PATH%/cdn";document.documentElement.dataset.iconPath="%BASE_PATH%/cdn/icons";</script>
  <include-file src="/includes/theme-boot.html"></include-file>
  <title>${title} — ${site.title}</title>
  <meta name="description" content="${description}">
  <link rel="stylesheet" href="/assets/vendor/vanilla-breeze.css">
  <link rel="stylesheet" href="/assets/pack/${site.packCss}">
  <link rel="stylesheet" href="/assets/docs.css">
  <link rel="stylesheet" href="/assets/site.css">
  ${slot:extraHead}
</head>
<body style="overflow-x: clip;">

  <include-file src="/includes/header.html"></include-file>

  <main data-pagefind-body style="overflow-x: clip;">
    <layout-sidebar data-layout-side="end" data-layout-sidebar-width="narrow" data-layout-gap="xl">
      <aside data-layout-sticky data-pagefind-ignore>
        <page-toc levels="h2,h3" scope="main article"></page-toc>
        <page-tools data-orientation="horizontal">
          <print-page></print-page>
          <share-wc variant="icon" size="s"></share-wc>
          <text-reader variant="icon" for="doc-article"></text-reader>
        </page-tools>
      </aside>
      <article id="doc-article">
        <heading-links levels="h2,h3">
          ${content}
        </heading-links>
      </article>
    </layout-sidebar>
  </main>

  <include-file src="/includes/footer.html"></include-file>

  <fab-stack>
    <settings-panel></settings-panel>
    <a href="#" data-back-to-top aria-label="Back to top">&uarr;</a>
  </fab-stack>

  <!-- Full Vanilla Breeze bundle: provides every component (specimens, theme
       tools, brand-mark, icon-wc, page-toc, theme-picker, site-search…). -->
  <script type="module" src="/assets/vendor/vanilla-breeze.js"></script>
  <!-- Pack supplies the pack-only specimens (token-specimen, component-sampler)
       that the full bundle omits; registerComponent is first-wins, so loading
       both is safe (no double-registration). -->
  <script type="module" src="/assets/pack/${site.packJs}"></script>
  <script type="module" src="/assets/vendor/code-block.js"></script>
  <script type="module" src="/assets/vendor/browser-window.js"></script>
  <script type="module" src="/assets/vendor/color-picker.js"></script>
  ${slot:extraScripts}
</body>
</html>
