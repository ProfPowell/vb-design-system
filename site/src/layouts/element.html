<!doctype html>
<html lang="en" data-theme="${defaultTheme}" data-mode="light" data-fluid>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>window.__VB_THEME_BASE="%BASE_PATH%/cdn";document.documentElement.dataset.iconPath="%BASE_PATH%/cdn/icons";</script>
  <title>${elementName} — ${site.title}</title>
  <meta name="description" content="${description}">
  <link rel="stylesheet" href="/assets/vendor/vanilla-breeze.css">
  <link rel="stylesheet" href="/assets/pack/${site.packCss}">
  <link rel="stylesheet" href="/assets/site.css">
  ${slot:extraHead}
</head>
<body>
  <include-file src="/includes/header.html"></include-file>

  <main>
    <layout-center data-layout-max="wide">
    <article id="doc-article" data-layout="stack" data-layout-gap="l">
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <ol data-layout="cluster" data-layout-gap="s">
          <li><a href="/">Home</a></li>
          <li><a href="/elements/">Elements</a></li>
          <li><span aria-current="page">${elementName}</span></li>
        </ol>
      </nav>
      <header data-layout="stack" data-layout-gap="s">
        <h1><code>&lt;${elementName}&gt;</code></h1>
        <p class="lead">${description}</p>
      </header>
      ${content}
      <p><a href="/elements/">← All elements</a></p>
    </article>
  </layout-center>
  </main>

  <include-file src="/includes/footer.html"></include-file>

  <script type="module" src="/assets/vendor/browser-window.js"></script>
  <script type="module" src="/assets/vendor/code-block.js"></script>
  <script type="module" src="/assets/pack/${site.packJs}"></script>
  <script type="module" src="/assets/vendor/vb-theme-picker.js"></script>
  ${slot:extraScripts}
</body>
</html>
