<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Home Preview — Theme Lab Surface</title>
  <script>window.__VB_THEME_BASE="%BASE_PATH%/cdn";document.documentElement.dataset.iconPath="%BASE_PATH%/cdn/icons";</script>
  <link rel="stylesheet" href="/assets/vendor/vanilla-breeze.css" />
  <style>
body { padding: var(--size-l); }

.preview { max-inline-size: 56rem; margin-inline: auto; }
.wide-panel { display: none; }

@media (min-width: 50rem) {
  .preview {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--size-l);
  }
  .wide-panel { display: flex; flex-direction: column; gap: var(--size-m); }
}
  </style>
</head>
<body>
  <h1>Home Preview — Theme Lab Surface</h1>
<main>
  <section class="preview">
    <layout-card data-variant="outlined">
      <header><h2>Sample Card</h2></header>
      <section data-layout="stack" data-layout-gap="s">
        <p>See how themes transform typography, colors, and components.</p>
        <label>Name <input type="text" value="Jane Doe" /></label>
        <progress value="70" max="100">70%</progress>
        <p><kbd>Ctrl</kbd>+<kbd>S</kbd> to save</p>
      </section>
      <footer data-layout="cluster" data-layout-gap="xs">
        <button type="button" class="small">Save</button>
        <button type="button" class="small secondary">Cancel</button>
        <button type="button" class="small ghost">Reset</button>
      </footer>
    </layout-card>

    <aside class="wide-panel" data-layout="stack" data-layout-gap="m">
      <details open>
        <summary>Settings</summary>
        <form class="stacked">
          <label>Role
            <select><option>Admin</option><option>Editor</option><option>Viewer</option></select>
          </label>
          <label><input type="checkbox" checked /> Email notifications</label>
        <button type="submit" hidden>Submit</button>
</form>
      </details>
      <table>
        <thead><tr><th scope="col">Shortcut</th><th scope="col">Action</th></tr></thead>
        <tbody>
          <tr><td><kbd>Ctrl</kbd>+<kbd>S</kbd></td><td>Save</td></tr>
          <tr><td><kbd>Ctrl</kbd>+<kbd>K</kbd></td><td>Search</td></tr>
          <tr><td><kbd>Ctrl</kbd>+<kbd>Z</kbd></td><td>Undo</td></tr>
        </tbody>
      </table>
    </aside>
  </section>
</main>

<script type="module" src="/assets/vendor/vanilla-breeze.js"></script>
<script type="module">
  // Apply URL-param theme overrides using plain data attributes + a theme CSS
  // <link>, mirroring what VB's ThemeManager.apply() sets on <html>. Keeps the
  // surface self-contained (no core-internal module imports needed).
  const CDN_BASE = window.__VB_THEME_BASE || '/cdn';
  const params = new URLSearchParams(location.search);
  const theme = params.get('theme');
  const mode = params.get('mode');
  const root = document.documentElement;
  if (theme) {
    await new Promise((res) => {
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = `${CDN_BASE}/themes/${theme}.css`;
      link.onload = res;
      link.onerror = res;
      document.head.appendChild(link);
    });
    root.dataset.theme = theme;
  }
  root.dataset.mode = (mode && mode !== 'auto') ? mode : 'light';
</script>
<script>
  // Report height to parent iframe host
  if (window.parent !== window) {
    const report = () => window.parent.postMessage(
      { type: 'surface-height', height: document.documentElement.scrollHeight },
      '*'
    );
    addEventListener('load', () => setTimeout(report, 200));
    new ResizeObserver(report).observe(document.documentElement);
  }
</script>
</body>
</html>
