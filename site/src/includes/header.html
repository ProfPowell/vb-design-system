<header data-layout="cluster" data-layout-justify="space-between" class="site-header">
  <a href="/" class="brand"><strong>${site.title}</strong></a>
  <nav data-layout="cluster" aria-label="Primary">
    <a href="/">Home</a>
    <a href="/elements/">Elements</a>
    <a href="${site.repo}">GitHub</a>
    <a href="${site.vbDocs}">Vanilla Breeze ↗</a>
    <form data-theme-picker aria-label="Theme">
      <label>Theme
        <select data-theme-select>
          <option value="modern">Modern</option>
          <option value="minimal">Minimal</option>
          <option value="classic">Classic</option>
          <option value="a11y-high-contrast">High contrast</option>
        </select>
      </label>
      <button type="button" data-mode-toggle aria-pressed="false">🌙 Dark</button>
    </form>
  </nav>
</header>
