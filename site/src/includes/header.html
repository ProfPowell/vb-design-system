<header class="site" data-sticky data-vt="header">
  <a href="/"><brand-mark>${site.title}</brand-mark></a>
  <nav-bar aria-label="Main navigation">
    <nav class="horizontal pills">
      <ul>
        <li><a href="/" data-nav-link>Home</a></li>
        <li><a href="/elements/" data-nav-link>Elements</a></li>
        <li><a href="/guides/" data-nav-link>Guides</a></li>
        <li><a href="/tools/theme-composer/" data-nav-link>Composer</a></li>
        <li><a href="/showcase/" data-nav-link>Showcases</a></li>
        <li><a href="${site.repo}" target="_blank" rel="noopener">GitHub</a></li>
        <li><a href="${site.vbDocs}" target="_blank" rel="noopener">Vanilla Breeze ↗</a></li>
      </ul>
    </nav>
  </nav-bar>
  <site-tools>
    <site-search>
      <button type="button" data-trigger class="ghost">
        <icon-wc name="search" size="sm"></icon-wc>
        Search
      </button>
    </site-search>
    <theme-picker compact>
      <button type="button" data-trigger class="ghost">
        <icon-wc name="palette" size="sm"></icon-wc>
        Theme
      </button>
    </theme-picker>
  </site-tools>
  <mobile-menu breakpoint="52rem">
    <button type="button" data-trigger popovertarget="mobile-menu" aria-label="Menu">
      <icon-wc name="menu"></icon-wc>
    </button>
    <nav popover id="mobile-menu" class="mobile-menu-panel">
      <button type="button" class="mobile-menu-close" popovertarget="mobile-menu" popovertargetaction="hide" aria-label="Close menu">
        <icon-wc name="x"></icon-wc>
      </button>
      <div class="mobile-menu-search">
        <site-search>
          <button type="button" data-trigger class="ghost" style="inline-size: 100%">
            <icon-wc name="search" size="sm"></icon-wc>
            Search
          </button>
        </site-search>
      </div>
      <ul>
        <li class="mobile-section">
          <strong class="mobile-section-title">Pages</strong>
          <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/elements/">Elements</a></li>
            <li><a href="/guides/">Guides</a></li>
            <li><a href="/tools/theme-composer/">Composer</a></li>
            <li><a href="/showcase/">Showcases</a></li>
            <li><a href="${site.repo}" target="_blank" rel="noopener">GitHub</a></li>
            <li><a href="${site.vbDocs}" target="_blank" rel="noopener">Vanilla Breeze ↗</a></li>
          </ul>
        </li>
      </ul>
      <div class="mobile-menu-theme">
        <strong class="mobile-section-title">Theme</strong>
        <theme-picker variant="inline" compact></theme-picker>
      </div>
    </nav>
  </mobile-menu>
</header>
